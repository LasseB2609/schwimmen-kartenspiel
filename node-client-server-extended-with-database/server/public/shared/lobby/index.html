<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../css/design.css">

  <title>Spiel Lobby</title>

  <!-- Bootstrap CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
    rel="stylesheet"
  >
</head>

<body class="bg-light">

  <div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 400px;">
      <h2 class="text-center mb-4">Lobby</h2>

      <button id="startBtn" class="btn btn-primary w-100 mb-2">
        Spiel starten
      </button>

      <button id="profileBtn" class="btn btn-secondary w-100 mb-2">
        Profil & Verwaltung
      </button>

      <div class="alert alert-info text-center mb-2">
        Münzen: <span id="coins">0</span>
      </div> <!-- kommt evtl noch raus-->

      <div class="alert alert-warning text-center mb-3">
        Level: <span id="level">???</span>
      </div>  <!-- kommt evtl noch raus-->

      <button id="helpBtn" class="btn btn-outline-dark w-100">
        Anleitung
      </button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
